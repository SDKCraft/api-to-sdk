      - paymentMethod
      - cardLast4
      - cardBrand
      properties:
        paymentMethod:
          type: string
          enum:
          - credit_card
        cardLast4:
          type: string
          pattern: ^\d{4}$
          example: '4242'
        cardBrand:
          type: string
          enum:
          - visa
          - mastercard
          - amex
          example: visa
