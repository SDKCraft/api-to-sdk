      operationId: exportReport
      description: Queues a report export job. The response is returned immediately (202); when the export
        finishes, MediCore will invoke the caller-supplied `callbackUrl` with the finished job details
        (see the `reportReady` callback).
      requestBody:
        required: true
        description: ReportExportRequest payload.
