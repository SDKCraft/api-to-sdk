      type: object
      description: Payment made in cash at the point of service.
      required:
      - paymentMethod
      - receivedBy
      properties:
        paymentMethod:
          type: string
          enum:
          - cash
        receivedBy:
          type: string
          description: Staff user ID who received the cash.
          format: uuid
