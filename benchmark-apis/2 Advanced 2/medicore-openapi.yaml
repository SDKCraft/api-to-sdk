openapi: 3.1.0
info:
  title: MediCore Hospital Management System API
  summary: Comprehensive hospital operations API
  description: 'MediCore is a full hospital management platform covering patient intake, clinical records,
    scheduling, pharmacy, billing, inventory, reporting, and administration. This specification is intentionally
    broad in scope and is used as a conformance/stress-test fixture: it exercises authentication schemes,
    composite schemas (oneOf/anyOf/allOf with discriminators), file upload/download, pagination, filtering,
    sorting, webhooks, and callbacks.'
  version: 1.4.0
  contact:
    name: MediCore API Team
    email: api-support@medicore.example
    url: https://developers.medicore.example
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: https://medicore.example/terms
servers:
- url: https://api.medicore.example/v1
  description: Production
- url: https://api.staging.medicore.example/v1
  description: Staging
- url: https://api.sandbox.medicore.example/v1
  description: Sandbox (synthetic data, safe for testing)
- url: http://localhost:8080/v1
  description: Local development
tags:
- name: Authentication
  description: Account creation, login, tokens, and password recovery
- name: Users
  description: Platform user (staff) accounts and profile assets
- name: Patients
  description: Patient records and patient-owned documents
- name: Doctors
  description: Doctor profiles and schedules
- name: Appointments
  description: Booking, rescheduling, and lifecycle of visits
- name: Medical Records
  description: Clinical encounter documentation
- name: Prescriptions
  description: Medication orders issued to patients
- name: Billing
  description: Invoices and payments
- name: Inventory
  description: Pharmacy and supply stock management
- name: Reports
  description: Operational and financial reporting
- name: Notifications
  description: In-app and external notification delivery
- name: Files
  description: Generic binary object storage
- name: Admin
  description: Platform configuration, roles, and audit trail
- name: Webhooks
  description: Events pushed to subscriber-supplied URLs (see /notifications/subscribe)
security:
- BearerAuth: []
- ApiKeyAuth: []
paths:
  /auth/register:
    post:
      tags:
      - Authentication
      summary: Register a new staff user account
      operationId: registerUser
      security: []
      parameters:
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/AcceptLanguageHeader'
      requestBody:
        required: true
        description: RegisterRequest payload.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Account created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '409':
          $ref: '#/components/responses/Conflict'
        '400': &id002
          $ref: '#/components/responses/BadRequest'
        '401': &id001
          $ref: '#/components/responses/Unauthorized'
        '403': &id003
          $ref: '#/components/responses/Forbidden'
        '429': &id004
          $ref: '#/components/responses/TooManyRequests'
        '500': &id005
          $ref: '#/components/responses/ServerError'
  /auth/login:
    post:
      tags:
      - Authentication
      summary: Authenticate with email and password
      operationId: login
      security: []
      parameters:
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/AcceptLanguageHeader'
      requestBody:
        required: true
        description: LoginRequest payload.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              default:
                $ref: '#/components/examples/LoginRequestExample'
      responses:
        '200':
          description: Authentication successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401': *id001
        '400': *id002
        '403': *id003
        '429': *id004
        '500': *id005
  /auth/refresh:
    post:
      tags:
      - Authentication
      summary: Exchange a refresh token for a new access token
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        description: RefreshTokenRequest payload.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: New token pair issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401': *id001
        '400': *id002
        '403': *id003
        '429': *id004
        '500': *id005
  /auth/logout:
    post:
      tags:
      - Authentication
      summary: Invalidate the current session's tokens
      operationId: logout
      responses:
        '204':
          description: Logged out successfully.
        '400': *id002
        '401': *id001
        '403': *id003
        '429': *id004
        '500': *id005
  /auth/forgot-password:
    post:
      tags:
      - Authentication
      summary: Request a password-reset email
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        description: ForgotPasswordRequest payload.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '202':
          description: If the email exists, a reset link has been sent.
        '400': *id002
        '401': *id001
        '403': *id003
        '429': *id004
        '500': *id005
  /auth/reset-password:
    post:
      tags:
      - Authentication
      summary: Reset password using a valid reset token
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        description: ResetPasswordRequest payload.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password updated successfully.
        '400': *id002
        '401': *id001
        '403': *id003
        '429': *id004
        '500': *id005
  /users:
    get:
      tags:
      - Users
      summary: List staff users
      operationId: listUsers
      parameters:
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      - $ref: '#/components/parameters/SortParam'
      - $ref: '#/components/parameters/SearchParam'
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/AcceptLanguageHeader'
      responses:
        '200':
          description: A paginated list of User resources.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '400': *id002
        '401': *id001
        '403': *id003
        '429': *id004
        '500': *id005
    post:
      tags:
      - Users
      summary: Create a staff user
      operationId: createUser
      parameters:
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/AcceptLanguageHeader'
      - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        description: UserCreate payload.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: User created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '409':
          $ref: '#/components/responses/Conflict'
        '400': *id002
        '401': *id001
        '403': *id003
        '429': *id004
        '500': *id005
  /users/{userId}:
    get:
      tags:
      - Users
      summary: Get a staff user by ID
      operationId: getUser
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/AcceptLanguageHeader'
      responses:
        '200':
          description: The requested User.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'
        '400': *id002
        '401': *id001
        '403': *id003
        '429': *id004
        '500': *id005
    patch:
      tags:
      - Users
      summary: Update a staff user
      operationId: updateUser
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/AcceptLanguageHeader'
      requestBody:
        required: true
        description: UserUpdate payload.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: The updated User.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'
        '400': *id002
        '401': *id001
        '403': *id003
        '429': *id004
        '500': *id005
    delete:
      tags:
      - Users
      summary: Deactivate/delete a staff user
      operationId: deleteUser
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/AcceptLanguageHeader'
      responses:
        '204':
          description: Deleted successfully; no content returned.
        '404':
          $ref: '#/components/responses/NotFound'
        '400': *id002
        '401': *id001
        '403': *id003
        '429': *id004
        '500': *id005
  /users/{userId}/avatar:
    post:
      tags:
      - Users
      summary: Upload or replace a user's avatar image
      operationId: uploadUserAvatar
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        $ref: '#/components/requestBodies/FileUploadBody'
      responses:
        '201':
          description: Avatar uploaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileMetadata'
        '404':
          $ref: '#/components/responses/NotFound'
        '400': *id002
        '401': *id001
        '403': *id003
        '429': *id004
        '500': *id005
    get:
      tags:
      - Users
      summary: Download a user's avatar image
      operationId: downloadUserAvatar
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Binary image content.
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'
        '400': *id002
        '401': *id001
        '403': *id003
        '429': *id004
        '500': *id005
  /patients:
    get:
      tags:
      - Patients
      summary: List patients
      operationId: listPatients
      parameters:
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      - $ref: '#/components/parameters/SortParam'
      - $ref: '#/components/parameters/SearchParam'
      - name: gender
        in: query
        schema:
          $ref: '#/components/schemas/Gender'
        description: Filter by gender.
      - name: bloodType
        in: query
        schema:
          $ref: '#/components/schemas/BloodType'
        description: Filter by blood type.
      - name: createdAfter
        in: query
        schema:
          type: string
          format: date-time
        description: Filter to patients created after this timestamp.
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/AcceptLanguageHeader'
      responses:
        '200':
          description: A paginated list of Patient resources.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Patient'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '400': *id002
        '401': *id001
        '403': *id003
        '429': *id004
        '500': *id005
    post:
      tags:
      - Patients
      summary: Register a new patient
      operationId: createPatient
      parameters:
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/AcceptLanguageHeader'
      - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        description: PatientCreate payload.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientCreate'
      responses:
        '201':
          description: Patient created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
        '409':
          $ref: '#/components/responses/Conflict'
        '400': *id002
        '401': *id001
        '403': *id003
        '429': *id004
        '500': *id005
  /patients/{patientId}:
    get:
      tags:
      - Patients
      summary: Get a patient by ID
      operationId: getPatient
      parameters:
      - name: patientId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/AcceptLanguageHeader'
      responses:
        '200':
          description: The requested Patient.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
              examples:
                sample:
                  $ref: '#/components/examples/PatientExample'
        '404':
          $ref: '#/components/responses/NotFound'
        '400': *id002
        '401': *id001
        '403': *id003
        '429': *id004
        '500': *id005
    patch:
      tags:
      - Patients
      summary: Update a patient
      operationId: updatePatient
      parameters:
      - name: patientId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/AcceptLanguageHeader'
      requestBody:
        required: true
        description: PatientUpdate payload.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientUpdate'
      responses:
        '200':
          description: The updated Patient.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
        '404':
          $ref: '#/components/responses/NotFound'
        '400': *id002
        '401': *id001
        '403': *id003
        '429': *id004
        '500': *id005
    delete:
      tags:
      - Patients
      summary: Delete a patient record
      operationId: deletePatient
      parameters:
      - name: patientId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/AcceptLanguageHeader'
      responses:
        '204':
          description: Deleted successfully; no content returned.
        '404':
          $ref: '#/components/responses/NotFound'
        '400': *id002
        '401': *id001
        '403': *id003
        '429': *id004
        '500': *id005
  /patients/{patientId}/medical-records:
    get:
      tags:
      - Patients
      - Medical Records
      summary: List medical records for a patient
      operationId: listPatientMedicalRecords
      parameters:
      - name: patientId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      - $ref: '#/components/parameters/SortParam'
      - $ref: '#/components/parameters/SearchParam'
      responses:
        '200':
          description: Medical records belonging to the patient.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/MedicalRecord'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '404':
          $ref: '#/components/responses/NotFound'
        '400': *id002
        '401': *id001
        '403': *id003
        '429': *id004
        '500': *id005
  /patients/{patientId}/documents:
    post:
      tags:
      - Patients
      - Files
      summary: Upload a document owned by a patient (e.g. scan, referral letter)
      operationId: uploadPatientDocument
      parameters:
      - name: patientId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        $ref: '#/components/requestBodies/FileUploadBody'
      responses:
        '201':
          description: Document uploaded and linked to the patient.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileMetadata'
        '404':
          $ref: '#/components/responses/NotFound'
        '400': *id002
        '401': *id001
        '403': *id003
        '429': *id004
        '500': *id005
  /doctors:
    get:
      tags:
      - Doctors
      summary: List doctors
      operationId: listDoctors
      parameters:
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      - $ref: '#/components/parameters/SortParam'
      - $ref: '#/components/parameters/SearchParam'
      - name: specialty
        in: query
        schema:
          $ref: '#/components/schemas/Specialty'
        description: Filter by specialty.
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/AcceptLanguageHeader'
      responses:
        '200':
          description: A paginated list of Doctor resources.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Doctor'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '400': *id002
        '401': *id001
        '403': *id003
        '429': *id004
        '500': *id005
    post:
      tags:
      - Doctors
      summary: Add a doctor profile
      operationId: createDoctor
      parameters:
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/AcceptLanguageHeader'
      - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        description: DoctorCreate payload.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoctorCreate'
      responses:
        '201':
          description: Doctor created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Doctor'
        '409':
          $ref: '#/components/responses/Conflict'
        '400': *id002
        '401': *id001
        '403': *id003
        '429': *id004
        '500': *id005
  /doctors/{doctorId}:
    get:
      tags:
      - Doctors
      summary: Get a doctor by ID
      operationId: getDoctor
      parameters:
      - name: doctorId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/AcceptLanguageHeader'
      responses:
        '200':
          description: The requested Doctor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Doctor'
        '404':
          $ref: '#/components/responses/NotFound'
        '400': *id002
        '401': *id001
        '403': *id003
        '429': *id004
        '500': *id005
    patch:
      tags:
      - Doctors
      summary: Update a doctor profile
      operationId: updateDoctor
      parameters:
      - name: doctorId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/AcceptLanguageHeader'
      requestBody:
        required: true
        description: DoctorUpdate payload.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoctorUpdate'
      responses:
        '200':
          description: The updated Doctor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Doctor'
        '404':
          $ref: '#/components/responses/NotFound'
        '400': *id002
        '401': *id001
        '403': *id003
        '429': *id004
        '500': *id005
    delete:
      tags:
      - Doctors
      summary: Remove a doctor profile
      operationId: deleteDoctor
      parameters:
      - name: doctorId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/AcceptLanguageHeader'
      responses:
        '204':
          description: Deleted successfully; no content returned.
        '404':
          $ref: '#/components/responses/NotFound'
        '400': *id002
        '401': *id001
        '403': *id003
        '429': *id004
        '500': *id005
  /doctors/{doctorId}/schedule:
    get:
      tags:
      - Doctors
      summary: Get a doctor's weekly availability schedule
      operationId: getDoctorSchedule
      parameters:
      - name: doctorId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: The doctor's weekly schedule.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScheduleSlot'
        '404':
          $ref: '#/components/responses/NotFound'
        '400': *id002
        '401': *id001
        '403': *id003
        '429': *id004
        '500': *id005
  /appointments:
    get:
      tags:
      - Appointments
      summary: List appointments
      operationId: listAppointments
      parameters:
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      - $ref: '#/components/parameters/SortParam'
      - $ref: '#/components/parameters/SearchParam'
      - name: status
        in: query
        schema:
          $ref: '#/components/schemas/AppointmentStatus'
        description: Filter by status.
      - name: doctorId
        in: query
        schema:
          type: string
          format: uuid
        description: Filter by doctor.
      - name: patientId
        in: query
        schema:
          type: string
          format: uuid
        description: Filter by patient.
      - name: from
        in: query
        schema:
          type: string
          format: date-time
        description: Only appointments scheduled on/after this timestamp.
      - name: to
        in: query
        schema:
          type: string
          format: date-time
        description: Only appointments scheduled on/before this timestamp.
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/AcceptLanguageHeader'
      responses:
        '200':
          description: A paginated list of Appointment resources.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Appointment'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '400': *id002
        '401': *id001
        '403': *id003
        '429': *id004
        '500': *id005
    post:
      tags:
      - Appointments
      summary: Book a new appointment
      operationId: createAppointment
      parameters:
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/AcceptLanguageHeader'
      - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        description: AppointmentCreate payload.
