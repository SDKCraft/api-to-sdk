      type: object
      description: Payment made via direct bank transfer.
      required:
      - paymentMethod
      - bankName
      - referenceNumber
      properties:
        paymentMethod:
          type: string
          enum:
          - bank_transfer
        bankName:
          type: string
          example: Jumhouria Bank
        referenceNumber:
          type: string
          example: TRX-2026-00981
