webhooks:
  appointmentCreated:
    post:
      summary: Fired when a new appointment is booked
      operationId: webhook_appointment_created
      tags:
      - Webhooks
      requestBody:
        required: true
        description: Delivered when a(n) `appointment.created` event occurs.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentCreatedEvent'
      responses:
        '200':
          description: Receiver acknowledges the event.
  invoicePaid:
    post:
      summary: Fired when an invoice becomes fully paid
      operationId: webhook_invoice_paid
      tags:
      - Webhooks
      requestBody:
        required: true
        description: Delivered when a(n) `invoice.paid` event occurs.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoicePaidEvent'
      responses:
        '200':
          description: Receiver acknowledges the event.
  prescriptionIssued:
    post:
      summary: Fired when a doctor issues a new prescription
      operationId: webhook_prescription_issued
      tags:
      - Webhooks
      requestBody:
        required: true
        description: Delivered when a(n) `prescription.issued` event occurs.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrescriptionIssuedEvent'
      responses:
        '200':
          description: Receiver acknowledges the event.
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT bearer token obtained from /auth/login or /auth/refresh.
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Static API key for server-to-server integrations (issued in the Admin console).
    OAuth2:
      type: oauth2
      description: OAuth2 for third-party integrations acting on behalf of a hospital tenant.
      flows:
        authorizationCode:
          authorizationUrl: https://auth.medicore.example/oauth/authorize
          tokenUrl: https://auth.medicore.example/oauth/token
          refreshUrl: https://auth.medicore.example/oauth/refresh
          scopes:
            patients:read: Read patient records
            patients:write: Create or modify patient records
            appointments:read: Read appointments
            appointments:write: Create or modify appointments
            billing:read: Read invoices and payments
            billing:write: Create or modify invoices and payments
            admin: Full administrative access
        clientCredentials:
          tokenUrl: https://auth.medicore.example/oauth/token
          scopes:
            patients:read: Read patient records
            billing:read: Read invoices and payments
  parameters:
    PageParam:
      name: page
      in: query
      required: false
      description: 1-indexed page number.
      schema:
        type: integer
        minimum: 1
        default: 1
      example: 1
    PageSizeParam:
      name: pageSize
      in: query
      required: false
      description: Number of items per page.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
      example: 20
    SortParam:
      name: sort
      in: query
      required: false
      description: Field to sort by, optionally prefixed with '-' for descending order (e.g. '-createdAt').
      schema:
        type: string
      example: -createdAt
    SearchParam:
      name: q
      in: query
      required: false
      description: Free-text search across the resource's primary fields.
      schema:
        type: string
    RequestIdHeader:
      name: X-Request-Id
      in: header
      required: false
      description: Client-supplied identifier echoed back for tracing; auto-generated if omitted.
      schema:
        type: string
        format: uuid
    TenantHeader:
      name: X-Tenant-Id
      in: header
      required: true
      description: Identifier of the hospital tenant/branch making the request.
      schema:
        type: string
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: false
      description: Client-generated key that ensures a write operation is applied only once.
      schema:
        type: string
    SessionCookie:
      name: medicore_session
      in: cookie
      required: false
      description: Optional session cookie set for browser-based dashboard clients.
      schema:
        type: string
    AcceptLanguageHeader:
      name: Accept-Language
      in: header
      required: false
      description: Preferred response language.
      schema:
        type: string
        enum:
        - en
        - ar
        - fr
        default: en
  schemas:
    Error:
      type: object
      description: Standard error envelope returned for all 4xx/5xx responses.
      required:
      - code
      - message
      properties:
        code:
          type: string
          description: Machine-readable error code.
          example: RESOURCE_NOT_FOUND
        message:
          type: string
          description: Human-readable error message.
          example: Patient not found.
        requestId:
          type: string
          format: uuid
          description: Correlates the error with server-side logs.
        details:
          type: array
          description: Optional list of granular field errors.
          items:
            $ref: '#/components/schemas/ValidationErrorDetail'
    ValidationErrorDetail:
      type: object
      required:
      - field
      - issue
      properties:
        field:
          type: string
          example: email
        issue:
          type: string
          example: must be a valid email address
    PaginationMeta:
      type: object
      description: Pagination metadata included alongside every list response.
      required:
      - page
      - pageSize
      - totalItems
      - totalPages
      properties:
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 20
        totalItems:
          type: integer
          example: 134
        totalPages:
          type: integer
          example: 7
    Address:
      type: object
      properties:
        street:
          type: string
          example: 12 Al Fateh Street
        city:
          type: string
          example: Tripoli
        state:
          type:
          - string
          - 'null'
          description: Governorate/state, if applicable
          example: Tripoli District
        postalCode:
          type:
          - string
          - 'null'
          description: Postal or ZIP code
          example: 00218
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code.
          example: LY
        geo:
          type: object
          description: Optional geocoordinates.
          properties:
            lat:
              type: number
              format: double
              example: 32.8872
            lng:
              type: number
              format: double
              example: 13.1913
    Metadata:
      type: object
      description: Free-form key/value store for tenant-specific custom fields (dictionary/map example).
      additionalProperties:
        type: string
      example:
        referredBy: Dr. Amina Salem
        vipTier: gold
    BaseEntity:
      type: object
      description: Common fields shared by all top-level persisted resources.
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier (UUID v4)
          readOnly: true
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        createdAt:
          type: string
          format: date-time
          readOnly: true
          description: Creation timestamp (RFC 3339)
          example: '2026-01-15T09:30:00Z'
        updatedAt:
          type: string
          format: date-time
          readOnly: true
          description: Last update timestamp (RFC 3339)
          example: '2026-02-01T14:12:00Z'
    UserRole:
      type: string
      description: Role assigned to a staff user.
      enum:
      - admin
      - receptionist
      - nurse
      - doctor
      - pharmacist
      - billing_officer
      example: nurse
    Gender:
      type: string
      enum:
      - male
      - female
      - other
      - unspecified
      example: female
    BloodType:
      type: string
      enum:
      - A+
      - A-
      - B+
      - B-
      - AB+
      - AB-
      - O+
      - O-
      - unknown
      example: O+
    Specialty:
      type: string
      enum:
      - cardiology
      - dermatology
      - endocrinology
      - gastroenterology
      - general_practice
      - neurology
      - obstetrics
      - oncology
      - orthopedics
      - pediatrics
      - psychiatry
      - radiology
      - surgery
      - urology
      example: cardiology
    AppointmentStatus:
      type: string
      enum:
      - requested
      - confirmed
      - checked_in
      - in_progress
      - completed
      - cancelled
      - no_show
      example: confirmed
    InvoiceStatus:
      type: string
      enum:
      - draft
      - issued
      - partially_paid
      - paid
      - overdue
      - void
      example: issued
    NotificationType:
      type: string
      enum:
      - appointment_reminder
      - lab_result_ready
      - invoice_issued
      - prescription_ready
      - system_alert
      example: appointment_reminder
    NotificationChannel:
      type: string
      enum:
      - email
      - sms
      - push
      - in_app
      example: push
    RegisterRequest:
      type: object
      required:
      - fullName
      - email
      - password
      - role
      properties:
        fullName:
          type: string
          minLength: 2
          maxLength: 120
          example: Salma Al-Barghathi
        email:
          type: string
          format: email
          example: salma.barghathi@medicore.example
        password:
          type: string
          format: password
          minLength: 8
          writeOnly: true
        role:
          $ref: '#/components/schemas/UserRole'
    LoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          writeOnly: true
        rememberMe:
          type: boolean
          default: false
    ForgotPasswordRequest:
      type: object
      required:
      - email
      properties:
        email:
          type: string
          format: email
    ResetPasswordRequest:
      type: object
      required:
      - token
      - newPassword
      properties:
        token:
          type: string
        newPassword:
          type: string
          format: password
          minLength: 8
          writeOnly: true
    RefreshTokenRequest:
      type: object
      required:
      - refreshToken
      properties:
        refreshToken:
          type: string
    TokenResponse:
      type: object
      required:
      - accessToken
      - refreshToken
      - expiresIn
      - tokenType
      properties:
        accessToken:
          type: string
          description: Short-lived JWT bearer token.
        refreshToken:
          type: string
          description: Long-lived token used to obtain new access tokens.
        tokenType:
          type: string
          enum:
          - Bearer
          default: Bearer
        expiresIn:
          type: integer
          description: Seconds until accessToken expires.
          example: 3600
    User:
      description: 'A staff user account (allOf: BaseEntity + user-specific fields).'
      allOf:
      - $ref: '#/components/schemas/BaseEntity'
      - type: object
        required:
        - fullName
        - email
        - role
        properties:
          fullName:
            type: string
            example: Salma Al-Barghathi
          email:
            type: string
            format: email
          role:
            $ref: '#/components/schemas/UserRole'
          isActive:
            type: boolean
            default: true
          phone:
            type:
            - string
            - 'null'
