openapi: 3.0.3
info:
  title: SDKCraft Advanced Benchmark API
  description: An advanced, production-grade E-Commerce, Logistics, and Payment Gateway API. Designed to benchmark comprehensive SDK generation, handling of complex nested structures, multi-part file uploads, polymorphism, and Webhook event structures.
  version: 1.0.0
servers:
  - url: https://api.sdkcraft-gateway.local/v1
    description: Sandbox Environment
  - url: https://api.sdkcraft.io/v1
    description: Production Gateway
paths:
  /auth/token:
    post:
      summary: Exchange API credentials for a session token
      operationId: createAccessToken
      tags:
        - Core Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - clientId
                - clientSecret
              properties:
                clientId:
                  type: string
                  format: uuid
                  example: e6b4c102-7a8e-4f11-9a2c-3b4c5d6e7f8a
                clientSecret:
                  type: string
                  format: password
                  example: sk_live_51NxF...
      responses:
        '200':
          description: Access token generated successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - token
                  - expiresAt
                properties:
                  token:
                    type: string
                    example: sdk_session_98234dba839210bc
                  expiresAt:
                    type: string
                    format: date-time
                    example: '2026-07-11T00:00:00Z'
        '400':
          description: Invalid client credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdvancedError'

  /products:
    get:
      summary: Search and filter marketplace products
      operationId: queryProducts
      tags:
        - Catalog Management
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
            example: electronics
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [draft, active, archived, out_of_stock]
            default: active
        - name: tags
          in: query
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated product checklist
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - meta
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '500':
          description: Internal gateway failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdvancedError'

    post:
      summary: Register a new enterprise product catalog entry
      operationId: createProduct
      tags:
        - Catalog Management
      security:
        - OAuth2Bearer: []
        - ApiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreatePayload'
      responses:
        '201':
          description: Product registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '422':
          description: Business validation rules failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdvancedError'

  /products/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Retrieve explicit details of a single catalog item
      operationId: getProductDetails
      tags:
        - Catalog Management
      responses:
        '200':
          description: Product object fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Resource does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdvancedError'

    patch:
      summary: Delta mutation of a marketplace product configuration
      operationId: partiallyUpdateProduct
      tags:
        - Catalog Management
      security:
        - OAuth2Bearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdatePayload'
      responses:
        '200':
          description: Updates integrated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'

  /products/{id}/media:
    post:
      summary: Upload catalog digital asset item (Binary Streams multipart)
      operationId: uploadProductMedia
      tags:
        - Catalog Management
      security:
        - OAuth2Bearer: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Raw image or document asset stream
                altText:
                  type: string
                  maxLength: 150
                  example: Side view look of the device
                assetType:
                  type: string
                  enum: [hero, thumbnail, manual]
                  default: hero
      responses:
        '200':
          description: Media parsed and associated successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - assetUrl
                  - processed
                properties:
                  assetUrl:
                    type: string
                    format: uri
                    example: https://cdn.sdkcraft.io/assets/prod-123.png
                  processed:
                    type: boolean
                    example: true

  /orders:
    post:
      summary: Instantiate an authorization flow and checkout process
      operationId: processCheckout
      tags:
        - Transaction Processing
      security:
        - OAuth2Bearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderPlacement'
      responses:
        '202':
          description: Transaction intent initialized safely
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderInvoice'
        '402':
          description: Credit limit or payment collection rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdvancedError'

  /orders/{orderId}/transactions:
    get:
      summary: Get comprehensive ledger tracking transaction attempts
      operationId: traceOrderLedger
      tags:
        - Transaction Processing
      security:
        - OAuth2Bearer: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Financial records matching reference id
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LedgerEntry'

components:
  securitySchemes:
    OAuth2Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyHeader:
      type: apiKey
      in: header
      name: X-SDKCraft-Key

  schemas:
    PaginationMeta:
      type: object
      required:
        - totalRecords
        - currentPage
        - totalPages
      properties:
        totalRecords:
          type: integer
          example: 1250
        currentPage:
          type: integer
          example: 1
        totalPages:
          type: integer
          example: 63

    Product:
      type: object
      required:
        - id
        - sku
        - label
        - financialMetrics
        - status
        - inventory
      properties:
        id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d
        sku:
          type: string
          example: PROD-ELEC-4122
        label:
          type: string
          example: High fidelity sound processor
        description:
          type: string
          example: Enterprise audio processing infrastructure node
        financialMetrics:
          $ref: '#/components/schemas/PriceMatrix'
        status:
          type: string
          enum: [draft, active, archived, out_of_stock]
        inventory:
          type: integer
          minimum: 0
          example: 450
        dimensions:
          type: object
          properties:
            weightGrams:
              type: number
              example: 125.5
            heightMm:
              type: integer
              example: 45

    PriceMatrix:
      type: object
      required:
        - baseAmount
        - currency
      properties:
        baseAmount:
          type: number
          format: float
          example: 299.99
        taxRate:
          type: number
          format: float
          default: 0.15
          example: 0.15
        currency:
          type: string
          maxLength: 3
          minLength: 3
          example: USD

    ProductCreatePayload:
      type: object
      required:
        - sku
        - label
        - financialMetrics
      properties:
        sku:
          type: string
          pattern: '^[A-Z]{4}-[A-Z]{4}-\d{4}$'
          example: LBTX-MEDI-9912
        label:
          type: string
          minLength: 5
          maxLength: 200
          example: Precision Pulse Monitor
        description:
          type: string
        financialMetrics:
          $ref: '#/components/schemas/PriceMatrix'
        initialStock:
          type: integer
          default: 0

    ProductUpdatePayload:
      type: object
      properties:
        label:
          type: string
        description:
          type: string
        financialMetrics:
          $ref: '#/components/schemas/PriceMatrix'
        status:
          type: string
          enum: [draft, active, archived, out_of_stock]

    OrderPlacement:
      type: object
      required:
        - customerProfileId
        - basketItems
        - settlementMethod
      properties:
        customerProfileId:
          type: string
          format: uuid
        basketItems:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - productId
              - volume
            properties:
              productId:
                type: string
                format: uuid
              volume:
                type: integer
                minimum: 1
                example: 2
        settlementMethod:
          type: string
          enum: [credit_card, wire_transfer, digital_wallet]

    OrderInvoice:
      type: object
      required:
        - transactionRef
        - aggregateCost
        - processState
      properties:
        transactionRef:
          type: string
          format: uuid
          example: f8c3b5d2-1a9e-4c11-8b2c-3b4c5d6e7f8a
        aggregateCost:
          type: number
          example: 599.98
        processState:
          type: string
          enum: [pending_settlement, processing, verified, failed]
          example: pending_settlement
        estimatedDelivery:
          type: string
          format: date-time
          example: '2026-07-15T12:00:00Z'

    LedgerEntry:
      type: object
      required:
        - entryId
        - valueDelta
        - capturedAt
      properties:
        entryId:
          type: string
          format: uuid
        valueDelta:
          type: number
          example: -599.98
        capturedAt:
          type: string
          format: date-time
        reversalIndicator:
          type: boolean
          default: false

    AdvancedError:
      type: object
      required:
        - errorCode
        - narrative
        - timestamps
      properties:
        errorCode:
          type: string
          example: RESOURCE_LOCKED_TRANSACTION
        narrative:
          type: string
          example: The record entity could not be modified due to execution locks.
        timestamps:
          type: string
          format: date-time
        contextDiagnostics:
          type: array
          items:
            type: string

webhooks:
  OnOrderSettled:
    post:
      summary: Dispatched asynchronously instantly upon complete verification of payment settlement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - eventId
                - triggeredType
                - dataPayload
              properties:
                eventId:
                  type: string
                  format: uuid
                  example: 2bc4d8e2-89ba-4b22-99fa-2c3b4c5d6e7f
                triggeredType:
                  type: string
                  example: order.settlement.confirmed
                dataPayload:
                  $ref: '#/components/schemas/OrderInvoice'
      responses:
        '200':
          description: Webhook event consumed and acknowledged by target infrastructure listener node